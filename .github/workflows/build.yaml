name: Generate plot and compile LaTeX

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: generate-calculus-files-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python -m pip install --upgrade numpy matplotlib

      - name: Generate f1.png
        run: python calculus/plot.py

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install --yes texlive-latex-base texlive-latex-recommended

      - name: Compile the LaTeX document
        working-directory: calculus
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Remove auxiliary LaTeX files
        run: |
          rm -f calculus/main.aux
          rm -f calculus/main.log
          rm -f calculus/main.out

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add calculus/f1.png calculus/main.pdf

          if git diff --cached --quiet; then
            echo "The generated files have not changed."
          else
            git commit -m "Automatically regenerate plot and PDF"
            git push
          fi
